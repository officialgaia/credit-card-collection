# Supabase ローカル開発用設定
# CLI のバージョンによってキーが変わる場合があります。
# エラーが出たら一度このファイルを退避し `supabase init` で再生成してから
# migrations/ と seed.sql を使ってください。
project_id = "credit-card-collection"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

# ローカル開発ではメール確認なしで即ログインできるようにする
[auth.email]
enable_signup = true
enable_confirmations = false
