<!--
  Supabase ダッシュボード → Authentication → Emails → "Confirm signup" の
  Message body (HTML) に貼り付けてください。
  変数 {{ .ConfirmationURL }} は Supabase が自動で差し込みます。
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="background:#0a0a0a;margin:0;padding:32px 0;font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0"
             style="width:480px;max-width:92%;background:#141416;border:1px solid #2a2a2e;border-radius:16px;overflow:hidden;">
        <tr>
          <td style="padding:28px 32px 8px;">
            <div style="font-size:20px;font-weight:700;color:#ededed;letter-spacing:-.2px;">
              Card<span style="color:#c9a86a;">Collection</span>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 0;">
            <h1 style="margin:8px 0 4px;font-size:20px;color:#ededed;">ご登録ありがとうございます</h1>
            <p style="margin:0 0 20px;font-size:14px;line-height:1.7;color:#a7a7b0;">
              下のボタンをクリックしてメールアドレスを確認し、登録を完了してください。
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding:4px 32px 8px;">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;background:#c9a86a;color:#0a0a0a;text-decoration:none;font-weight:700;font-size:14px;padding:12px 28px;border-radius:8px;">
              メールアドレスを確認する
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px 28px;">
            <p style="margin:0 0 6px;font-size:12px;color:#8a8a92;">
              ボタンが開けない場合は、次のURLをブラウザに貼り付けてください。
            </p>
            <p style="margin:0;font-size:12px;color:#c9a86a;word-break:break-all;">
              {{ .ConfirmationURL }}
            </p>
            <hr style="border:none;border-top:1px solid #2a2a2e;margin:20px 0;">
            <p style="margin:0;font-size:11px;line-height:1.6;color:#6f6f78;">
              このメールに心当たりがない場合は破棄してください。<br>
              年会費・還元率等は公開情報をもとにした目安です。
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
